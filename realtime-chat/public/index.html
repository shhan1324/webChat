<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kakao: {
              bg:          '#B2C7D9',
              mine:        '#FEE500',
              'mine-text': '#111111',
              other:       '#FFFFFF',
            },
          },
          borderRadius: { bubble: '18px' },
          keyframes: {
            blink: {
              '0%, 80%, 100%': { opacity: 0 },
              '40%':           { opacity: 1 },
            },
            fadeIn: {
              '0%':   { opacity: 0, transform: 'translateY(6px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
          },
          animation: {
            blink:   'blink 1.2s infinite ease-in-out',
            'fade-in': 'fadeIn .2s ease',
          },
        },
      },
    };
  </script>
  <style>
    .bubble-mine::after {
      content: '';
      position: absolute;
      bottom: 6px; right: -6px;
      border: 6px solid transparent;
      border-left-color: #FEE500;
      border-right: 0;
    }
    .bubble-other::after {
      content: '';
      position: absolute;
      bottom: 6px; left: -6px;
      border: 6px solid transparent;
      border-right-color: #FFFFFF;
      border-left: 0;
    }
    #message-list::-webkit-scrollbar        { width: 4px; }
    #message-list::-webkit-scrollbar-thumb  { background: rgba(0,0,0,.2); border-radius: 4px; }
    #user-sidebar-list::-webkit-scrollbar       { width: 3px; }
    #user-sidebar-list::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 4px; }

    .dot-1 { animation: blink 1.2s infinite ease-in-out 0s; }
    .dot-2 { animation: blink 1.2s infinite ease-in-out .2s; }
    .dot-3 { animation: blink 1.2s infinite ease-in-out .4s; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 50;
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }

    /* 사용자 항목 입장 애니메이션 */
    .user-item { animation: fadeIn .2s ease; }
  </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">

  <!-- ── 닉네임 모달 ─────────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="nicknameModal">
    <div class="bg-white rounded-2xl shadow-2xl w-80 p-8 flex flex-col gap-5">
      <div>
        <h2 class="text-lg font-bold text-gray-900 mb-1">👋 환영합니다!</h2>
        <p class="text-sm text-gray-500">채팅에서 사용할 닉네임을 입력해주세요.</p>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-600">닉네임</label>
        <input id="nickname-modal-input" type="text" maxlength="20" placeholder="예: 홍길동"
          class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-500 transition-colors" />
        <span id="nickname-error" class="text-xs text-red-500 hidden">닉네임을 입력해주세요.</span>
      </div>
      <button id="nickname-confirm-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl py-2.5 text-sm transition-colors">
        확인
      </button>
    </div>
  </div>

  <!-- ── 방 입장 화면 ────────────────────────────────────────────────────── -->
  <div id="join-screen" class="hidden h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-80 p-8 flex flex-col gap-5">
      <div>
        <p id="join-greeting" class="text-sm font-semibold text-indigo-600 mb-1"></p>
        <h2 class="text-lg font-bold text-gray-900 mb-1">Realtime Chat</h2>
        <p class="text-sm text-gray-500">입장할 방 이름을 입력하세요.</p>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-600">방 이름</label>
        <input id="room-input" type="text" maxlength="30" placeholder="예: general"
          class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-500 transition-colors" />
        <span class="text-xs text-gray-400">
          URL 파라미터 <code class="bg-gray-100 px-1 rounded">?room=이름</code>으로 자동 입력됩니다.
        </span>
      </div>
      <button id="join-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl py-2.5 text-sm transition-colors">
        입장하기
      </button>
      <button id="change-nick-btn" class="text-xs text-gray-400 hover:text-indigo-500 transition-colors text-center">
        닉네임 변경
      </button>
    </div>
  </div>

  <!-- ── 채팅 화면 ──────────────────────────────────────────────────────── -->
  <div id="chat-screen" class="hidden h-screen items-start justify-center">
    <!-- 전체 컨테이너: 채팅 영역 + 우측 사이드바 -->
    <div class="w-full max-w-4xl h-screen flex gap-3 p-4">

      <!-- ── 채팅 메인 영역 ─────────────────────────────────────────────── -->
      <div class="flex-1 min-w-0 flex flex-col">

        <!-- 헤더 -->
        <div class="bg-indigo-600 text-white rounded-t-2xl px-5 py-3 flex items-center justify-between flex-shrink-0">
          <div class="flex items-center gap-3">
            <span class="w-2 h-2 rounded-full bg-green-300 flex-shrink-0"></span>
            <div>
              <div id="header-room" class="font-bold text-sm"></div>
              <div id="header-nickname" class="text-xs opacity-70"></div>
            </div>
          </div>
          <button id="leave-btn"
            class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full transition-colors">
            나가기
          </button>
        </div>

        <!-- 메시지 목록 -->
        <ul id="message-list"
          class="flex-1 overflow-y-auto bg-kakao-bg flex flex-col gap-2 px-4 py-3">
        </ul>

        <!-- 입력 중 표시 -->
        <div id="typing-indicator"
          class="hidden bg-kakao-bg px-5 pb-1 flex items-center gap-1.5 text-xs text-gray-500">
          <span id="typing-text"></span>
          <span class="flex gap-0.5 ml-0.5">
            <span class="dot-1 w-1.5 h-1.5 rounded-full bg-gray-400 inline-block"></span>
            <span class="dot-2 w-1.5 h-1.5 rounded-full bg-gray-400 inline-block"></span>
            <span class="dot-3 w-1.5 h-1.5 rounded-full bg-gray-400 inline-block"></span>
          </span>
        </div>

        <!-- 입력창 -->
        <div class="bg-white border-t border-gray-200 rounded-b-2xl px-4 py-3 flex gap-2 flex-shrink-0 items-center">
          <input id="file-input" type="file" accept="image/jpeg,image/png,image/gif,image/webp" class="hidden" />
          <button id="upload-btn" title="이미지 전송"
            class="flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-full
                   text-gray-400 hover:text-indigo-500 hover:bg-indigo-50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14
                   M8 10a2 2 0 100-4 2 2 0 000 4zm-4 8V6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2z"/>
            </svg>
          </button>
          <input id="msg-input" type="text" autocomplete="off" placeholder="메시지를 입력하세요..."
            class="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm outline-none focus:border-indigo-500 transition-colors" />
          <button id="send-btn"
            class="bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold
                   rounded-full px-5 py-2 text-sm transition-colors whitespace-nowrap">
            전송
          </button>
        </div>

        <!-- 업로드 진행 바 -->
        <div id="upload-progress" class="hidden bg-white rounded-b-2xl px-4 pb-2">
          <div class="flex items-center gap-2 text-xs text-gray-500 mb-1">
            <svg class="w-3.5 h-3.5 animate-spin text-indigo-500" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            <span id="upload-status">이미지 업로드 중...</span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-1">
            <div id="progress-bar" class="bg-indigo-500 h-1 rounded-full transition-all duration-300" style="width:0%"></div>
          </div>
        </div>

      </div><!-- /채팅 메인 -->

      <!-- ── 우측 사이드바: 접속자 목록 ──────────────────────────────────── -->
      <div class="w-52 flex-shrink-0 flex flex-col rounded-2xl overflow-hidden shadow-sm">

        <!-- 사이드바 헤더 -->
        <div class="bg-indigo-600 px-4 py-3 flex-shrink-0">
          <div class="flex items-center gap-2 text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-80" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87
                   m9-4.13a4 4 0 11-8 0 4 4 0 018 0zm6 4a4 4 0 00-3-3.87"/>
            </svg>
            <span class="text-sm font-semibold">참여자</span>
            <span id="user-count"
              class="ml-auto bg-white/25 text-white text-xs font-bold px-2 py-0.5 rounded-full min-w-[24px] text-center">
              0
            </span>
          </div>
        </div>

        <!-- 사용자 목록 -->
        <ul id="user-sidebar-list"
          class="flex-1 overflow-y-auto bg-white divide-y divide-gray-50 p-0">
        </ul>

        <!-- 사이드바 푸터 -->
        <div class="bg-indigo-50 border-t border-indigo-100 px-4 py-2 flex-shrink-0">
          <p class="text-xs text-indigo-400 text-center">
            🟢 온라인
          </p>
        </div>

      </div><!-- /사이드바 -->

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // ── 상태 ──────────────────────────────────────────────────────────────────
    let myNickname   = '';
    let myRoom       = '';
    let typingTimer  = null;
    let isNearBottom = true;

    const typingUsers = new Set();

    // ── DOM ───────────────────────────────────────────────────────────────────
    const nicknameModal      = document.getElementById('nicknameModal');
    const nicknameModalInput = document.getElementById('nickname-modal-input');
    const nicknameConfirmBtn = document.getElementById('nickname-confirm-btn');
    const nicknameError      = document.getElementById('nickname-error');

    const joinScreen    = document.getElementById('join-screen');
    const joinGreeting  = document.getElementById('join-greeting');
    const roomInput     = document.getElementById('room-input');
    const joinBtn       = document.getElementById('join-btn');
    const changeNickBtn = document.getElementById('change-nick-btn');

    const chatScreen     = document.getElementById('chat-screen');
    const headerRoom     = document.getElementById('header-room');
    const headerNickname = document.getElementById('header-nickname');
    const leaveBtn       = document.getElementById('leave-btn');
    const messageList    = document.getElementById('message-list');
    const msgInput       = document.getElementById('msg-input');
    const sendBtn        = document.getElementById('send-btn');

    const userCount       = document.getElementById('user-count');
    const userSidebarList = document.getElementById('user-sidebar-list');

    const typingIndicator = document.getElementById('typing-indicator');
    const typingText      = document.getElementById('typing-text');

    const fileInput      = document.getElementById('file-input');
    const uploadBtn      = document.getElementById('upload-btn');
    const uploadProgress = document.getElementById('upload-progress');
    const uploadStatus   = document.getElementById('upload-status');
    const progressBar    = document.getElementById('progress-bar');

    // ── 자동 스크롤 ───────────────────────────────────────────────────────────
    messageList.addEventListener('scroll', () => {
      const threshold = 80;
      isNearBottom =
        messageList.scrollHeight - messageList.scrollTop - messageList.clientHeight <= threshold;
    });

    function scrollToBottom(force = false) {
      if (force || isNearBottom) messageList.scrollTop = messageList.scrollHeight;
    }

    // ── 화면 전환 ─────────────────────────────────────────────────────────────
    function showModal() {
      nicknameModal.classList.add('active');
      setTimeout(() => nicknameModalInput.focus(), 50);
    }
    function hideModal() { nicknameModal.classList.remove('active'); }

    function showJoinScreen() {
      joinGreeting.textContent = `${myNickname}님, 안녕하세요!`;
      const urlRoom = new URLSearchParams(location.search).get('room');
      if (urlRoom) roomInput.value = urlRoom;
      chatScreen.classList.add('hidden');
      chatScreen.classList.remove('flex');
      joinScreen.classList.remove('hidden');
      joinScreen.classList.add('flex');
      roomInput.focus();
    }

    function showChatScreen() {
      joinScreen.classList.add('hidden');
      joinScreen.classList.remove('flex');
      chatScreen.classList.remove('hidden');
      chatScreen.classList.add('flex');
      msgInput.focus();
    }

    // ── 닉네임 모달 ───────────────────────────────────────────────────────────
    function confirmNickname() {
      const val = nicknameModalInput.value.trim();
      if (!val) { nicknameError.classList.remove('hidden'); nicknameModalInput.focus(); return; }
      nicknameError.classList.add('hidden');
      myNickname = val;
      localStorage.setItem('chat_nickname', val);
      hideModal();
      showJoinScreen();
    }

    nicknameConfirmBtn.addEventListener('click', confirmNickname);
    nicknameModalInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmNickname(); });
    changeNickBtn.addEventListener('click', () => {
      joinScreen.classList.add('hidden');
      nicknameModalInput.value = myNickname;
      showModal();
    });

    // ── 방 입장 ───────────────────────────────────────────────────────────────
    function joinRoom() {
      const room = roomInput.value.trim();
      if (!room) { roomInput.focus(); return; }
      myRoom = room;
      socket.emit('join room', { room, nickname: myNickname });
    }

    joinBtn.addEventListener('click', joinRoom);
    roomInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinRoom(); });

    // ── 사이드바 사용자 목록 렌더 ─────────────────────────────────────────────
    function avatarColor(name) {
      // 닉네임 기반 결정론적 색상
      const colors = [
        'bg-rose-400', 'bg-orange-400', 'bg-amber-400', 'bg-lime-500',
        'bg-emerald-500', 'bg-teal-500', 'bg-cyan-500', 'bg-sky-500',
        'bg-blue-500', 'bg-violet-500', 'bg-purple-500', 'bg-pink-500',
      ];
      let hash = 0;
      for (const c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xffff;
      return colors[hash % colors.length];
    }

    function renderUserList(users) {
      userCount.textContent    = users.length;
      userSidebarList.innerHTML = '';

      users.forEach((name) => {
        const isMe = name === myNickname;
        const li   = document.createElement('li');
        li.className = 'user-item flex items-center gap-3 px-4 py-2.5 hover:bg-indigo-50 transition-colors';

        // 아바타 (닉네임 첫 글자)
        const avatar = document.createElement('div');
        avatar.className = `${avatarColor(name)} w-8 h-8 rounded-full flex items-center justify-center
                            text-white text-xs font-bold flex-shrink-0`;
        avatar.textContent = name.charAt(0).toUpperCase();

        // 닉네임 + 배지
        const info = document.createElement('div');
        info.className = 'flex-1 min-w-0';

        const nameEl = document.createElement('p');
        nameEl.className = `text-sm font-medium truncate ${isMe ? 'text-indigo-600' : 'text-gray-800'}`;
        nameEl.textContent = name;
        info.appendChild(nameEl);

        if (isMe) {
          const badge = document.createElement('p');
          badge.className = 'text-xs text-indigo-400';
          badge.textContent = '나';
          info.appendChild(badge);
        }

        // 온라인 점
        const dot = document.createElement('span');
        dot.className = 'w-2 h-2 rounded-full bg-green-400 flex-shrink-0';

        li.appendChild(avatar);
        li.appendChild(info);
        li.appendChild(dot);
        userSidebarList.appendChild(li);
      });
    }

    // ── 입력 중 표시 ──────────────────────────────────────────────────────────
    function renderTypingIndicator() {
      const users = Array.from(typingUsers);
      if (users.length === 0) { typingIndicator.classList.add('hidden'); return; }
      typingIndicator.classList.remove('hidden');
      typingText.textContent =
        users.length === 1 ? `${users[0]}님이 입력 중입니다` :
        users.length === 2 ? `${users[0]}, ${users[1]}님이 입력 중입니다` :
                             `${users[0]} 외 ${users.length - 1}명이 입력 중입니다`;
      scrollToBottom();
    }

    // ── 메시지 렌더 ───────────────────────────────────────────────────────────
    function addSystemMsg(text) {
      const li = document.createElement('li');
      li.className = 'self-center text-xs text-gray-500 bg-black/10 rounded-full px-3 py-1';
      li.textContent = text;
      messageList.appendChild(li);
      scrollToBottom();
    }

    function addDivider(text) {
      const li = document.createElement('li');
      li.className = 'flex items-center gap-2 text-xs text-gray-400 my-1';
      li.innerHTML = `<span class="flex-1 h-px bg-black/10"></span><span>${text}</span><span class="flex-1 h-px bg-black/10"></span>`;
      messageList.appendChild(li);
    }

    function createBubbleWrap(nickname, isMine) {
      const li = document.createElement('li');
      li.className = `flex flex-col gap-0.5 max-w-[70%] ${isMine ? 'self-end items-end' : 'self-start items-start'}`;
      if (!isMine) {
        const name = document.createElement('span');
        name.className = 'text-xs text-gray-600 font-medium px-1';
        name.textContent = nickname;
        li.appendChild(name);
      }
      return li;
    }

    function addMessage(nickname, message, isMine) {
      const li     = createBubbleWrap(nickname, isMine);
      const bubble = document.createElement('div');
      bubble.className = [
        'relative px-3.5 py-2 text-sm leading-relaxed break-words rounded-bubble shadow-sm',
        isMine ? 'bubble-mine bg-kakao-mine text-kakao-mine-text rounded-br-sm'
               : 'bubble-other bg-kakao-other text-gray-900 rounded-bl-sm',
      ].join(' ');
      bubble.textContent = message;
      li.appendChild(bubble);
      messageList.appendChild(li);
      scrollToBottom();
    }

    function addImageMessage(nickname, imageUrl, isMine) {
      const li   = createBubbleWrap(nickname, isMine);
      const wrap = document.createElement('div');
      wrap.className = `relative rounded-2xl overflow-hidden shadow-sm cursor-pointer ${isMine ? 'rounded-br-sm' : 'rounded-bl-sm'}`;
      const img  = document.createElement('img');
      img.src       = imageUrl;
      img.alt       = '이미지';
      img.className = 'max-w-[220px] max-h-[280px] object-cover block';
      img.loading   = 'lazy';
      img.addEventListener('click', () => window.open(imageUrl, '_blank'));
      img.addEventListener('error', () => { wrap.textContent = '이미지를 불러올 수 없습니다.'; });
      img.addEventListener('load',  () => scrollToBottom());
      wrap.appendChild(img);
      li.appendChild(wrap);
      messageList.appendChild(li);
      scrollToBottom();
    }

    // ── 입장 확인 + 히스토리 ──────────────────────────────────────────────────
    socket.on('room joined', ({ room, nickname, history, userList }) => {
      headerRoom.textContent     = `# ${room}`;
      headerNickname.textContent = nickname;
      messageList.innerHTML      = '';
      typingUsers.clear();
      renderTypingIndicator();
      isNearBottom = true;

      renderUserList(userList);

      if (history.length > 0) {
        addDivider(`이전 대화 ${history.length}개`);
        history.forEach(({ username, message, type }) => {
          const isMine = username === myNickname;
          type === 'image' ? addImageMessage(username, message, isMine)
                           : addMessage(username, message, isMine);
        });
        addDivider('여기서부터 새 메시지');
      }

      window.history.replaceState(null, '', `?room=${encodeURIComponent(room)}`);
      showChatScreen();
      scrollToBottom(true);
    });

    // ── 나가기 ────────────────────────────────────────────────────────────────
    leaveBtn.addEventListener('click', () => {
      myRoom = '';
      messageList.innerHTML = '';
      typingUsers.clear();
      renderTypingIndicator();
      window.history.replaceState(null, '', location.pathname);
      showJoinScreen();
    });

    // ── 메시지 전송 ───────────────────────────────────────────────────────────
    function sendMessage() {
      const message = msgInput.value.trim();
      if (!message || !myRoom) return;
      clearTimeout(typingTimer);
      socket.emit('stop typing');
      socket.emit('chat message', { message });
      addMessage(myNickname, message, true);
      msgInput.value = '';
      msgInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    // ── 입력 중 감지 ──────────────────────────────────────────────────────────
    msgInput.addEventListener('input', () => {
      if (!myRoom) return;
      if (msgInput.value.trim()) {
        socket.emit('typing');
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => socket.emit('stop typing'), 2000);
      } else {
        clearTimeout(typingTimer);
        socket.emit('stop typing');
      }
    });

    // ── 이미지 업로드 ─────────────────────────────────────────────────────────
    uploadBtn.addEventListener('click', () => {
      if (!myRoom) return;
      fileInput.value = '';
      fileInput.click();
    });

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file || !myRoom) return;
      if (!file.type.startsWith('image/')) return alert('이미지 파일만 업로드할 수 있습니다.');
      if (file.size > 5 * 1024 * 1024)    return alert('파일 크기는 5MB 이하여야 합니다.');

      const formData = new FormData();
      formData.append('image',    file);
      formData.append('room',     myRoom);
      formData.append('nickname', myNickname);

      uploadProgress.classList.remove('hidden');
      uploadStatus.textContent = '이미지 업로드 중...';
      uploadBtn.disabled = true;

      try {
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
              const pct = Math.round((e.loaded / e.total) * 100);
              progressBar.style.width  = `${pct}%`;
              uploadStatus.textContent = `업로드 중... ${pct}%`;
            }
          });
          xhr.addEventListener('load', () =>
            xhr.status < 300 ? resolve() : reject(new Error(JSON.parse(xhr.responseText).error)));
          xhr.addEventListener('error', () => reject(new Error('네트워크 오류')));
          xhr.open('POST', '/upload');
          xhr.send(formData);
        });
        uploadStatus.textContent = '업로드 완료!';
        progressBar.style.width  = '100%';
      } catch (err) {
        alert(`업로드 실패: ${err.message}`);
        uploadStatus.textContent = '업로드 실패';
      } finally {
        setTimeout(() => {
          uploadProgress.classList.add('hidden');
          progressBar.style.width = '0%';
          uploadBtn.disabled = false;
        }, 800);
      }
    });

    // ── 소켓 이벤트 수신 ──────────────────────────────────────────────────────
    socket.on('chat message', ({ nickname, message }) => {
      if (nickname === myNickname) return;
      typingUsers.delete(nickname);
      renderTypingIndicator();
      addMessage(nickname, message, false);
    });

    socket.on('chat image', ({ nickname, imageUrl }) => {
      addImageMessage(nickname, imageUrl, nickname === myNickname);
    });

    socket.on('system message', (text) => addSystemMsg(text));

    socket.on('user list', (users) => renderUserList(users));

    socket.on('typing',      ({ nickname }) => { typingUsers.add(nickname);    renderTypingIndicator(); });
    socket.on('stop typing', ({ nickname }) => { typingUsers.delete(nickname); renderTypingIndicator(); });

    socket.on('disconnect', () => {
      addSystemMsg('서버와 연결이 끊어졌습니다.');
      typingUsers.clear();
      renderTypingIndicator();
    });

    // ── 초기 진입 ─────────────────────────────────────────────────────────────
    const saved = localStorage.getItem('chat_nickname');
    if (saved) { myNickname = saved; showJoinScreen(); }
    else        showModal();
  </script>
</body>
</html>
